name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate scenario schema
        run: python tools/validate_schema.py
      - name: Verify workspace-variant generator
        run: python tools/workspace_variants.py --variant v2-neon --verify
