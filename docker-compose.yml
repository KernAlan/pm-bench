# docker-compose profile for PM-Bench.
#
# Usage:
#   docker compose build
#   ANTHROPIC_API_KEY=sk-ant-... docker compose run --rm pm-bench
#
# The default `command` runs the Superhuman 20 MCQ subset. Override it on
# the command line for other runs:
#   docker compose run --rm pm-bench python run.py --provider mock
#   docker compose run --rm pm-bench python run.py --mode open-ended
services:
  pm-bench:
    build: .
    image: pm-bench:latest
    environment:
      # These are passed through from the host if set; missing vars are
      # fine for mock-provider runs.
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
    volumes:
      # Persist run artifacts on the host so results survive container
      # restarts and can be analyzed outside the image.
      - ./results:/app/results
      - ./analysis:/app/analysis
    # Override the image ENTRYPOINT so we can run raw python commands.
    entrypoint: []
    command: python run.py --superhuman-only
